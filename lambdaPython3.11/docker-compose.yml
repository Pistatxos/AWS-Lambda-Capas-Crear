services:
  lambda:
    build:
      context: .
      dockerfile: ./infraestructura/Dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      # Monta volumen para facilitar copia de librerías y archivos de salida
      - ./app:/var/task 
    # Mantener contenedor en ejecución
    tty: true
    entrypoint: /bin/bash
